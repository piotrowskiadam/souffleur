name: Deploy Extensions to Web Stores

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy-chrome:
    name: Deploy Google Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Zip Chrome Extension
        run: |
          cd souffleur_chrome
          zip -r ../souffleur-chrome.zip .
          cd ..

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: souffleur-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  deploy-firefox:
    name: Deploy Mozilla Firefox Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Package & Publish to Mozilla Add-ons
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: ./souffleur_firefox
          apiKey: ${{ secrets.MOZILLA_JWT_ISSUER }}
          apiSecret: ${{ secrets.MOZILLA_JWT_SECRET }}
          channel: listed
